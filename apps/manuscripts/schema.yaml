paths:
  /api/v1/manuscripts/item-parts/:
    get:
      operationId: item-part-list
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemPart'
      tags:
        - manuscripts
  /api/v1/manuscripts/item-parts/{id}/:
    get:
      operationId: item-part-detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPartDetails'
      tags:
        - manuscripts
  /api/v1/manuscripts/item-images/:
    get:
      operationId: item-part-images-list
      parameters:
        - name: item_part
          in: query
          required: false
          schema:
            type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPartImage'
      tags:
        - manuscripts
  /api/v1/manuscripts/item-images/{id}/:
    get:
      operationId: item-part-images-detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemPartImage'
      tags:
        - manuscripts
  /api/v1/search/item-parts/facets/:
    get:
      operationId: search-item-parts-facets
      parameters:
        - name: min_date
          in: query
          description: Start of the date range to filter. Provide an integer representing a year or numeric date value (e.g., 1200).
          required: false
          schema:
            type: integer
        - name: max_date
          in: query
          description: End of the date range to filter. Provide an integer representing a year or numeric date value (e.g., 1300).
          required: false
          schema:
            type: integer
        - name: at_most_or_least
          in: query
          description: Filter objects with a date difference. Use `at most` to set a maximum difference or `at least` to set a minimum difference.
          required: false
          schema:
            type: string
            enum: [ at most, at least ]
        - name: date_diff
          in: query
          description: Integer value to specify the date difference for filtering. Works with `at_most_or_least` to apply the filter.
          required: false
          schema:
            type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: object
                    properties:
                      __facet_name__:
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                            count:
                              type: integer
                            narrow_url:
                              type: string
                  dates:
                    type: object
                  queries:
                    type: object
                  objects:
                    type: object
                    properties:
                      count:
                        type: integer
                      next:
                        type: string
                      previous:
                        type: string
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/ItemPartSearchResult'
      tags:
        - search
  /api/v1/search/item-images/facets/:
    get:
      operationId: search-item-images-facets
      parameters:
        - name: min_date
          in: query
          description: Start of the date range to filter. Provide an integer representing a year or numeric date value (e.g., 1200).
          required: false
          schema:
            type: integer
        - name: max_date
          in: query
          description: End of the date range to filter. Provide an integer representing a year or numeric date value (e.g., 1300).
          required: false
          schema:
            type: integer
        - name: at_most_or_least
          in: query
          description: Filter objects with a date difference. Use `at most` to set a maximum difference or `at least` to set a minimum difference.
          required: false
          schema:
            type: string
            enum: [ at most, at least ]
        - name: date_diff
          in: query
          description: Integer value to specify the date difference for filtering. Works with `at_most_or_least` to apply the filter.
          required: false
          schema:
            type: integer
      responses:
        200:
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: object
                    properties:
                      __facet_name__:
                        type: array
                        items:
                          type: object
                          properties:
                            text:
                              type: string
                            count:
                              type: integer
                            narrow_url:
                              type: string
                  dates:
                    type: object
                  queries:
                    type: object
                  objects:
                    type: object
                    properties:
                      count:
                        type: integer
                      next:
                        type: string
                      previous:
                        type: string
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/ItemPartImage'
      tags:
        - search
  /api/v1/manuscripts/management/historical-items/:
    get:
      operationId: management-historical-items-list
      security:
        - api_key: []
      responses:
        200:
          description: List historical items for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoricalItemManagementListItem'
      tags:
        - manuscripts-management
    post:
      operationId: management-historical-items-create
      security:
        - api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoricalItemManagementWrite'
      responses:
        201:
          description: Created historical item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricalItemManagementListItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/historical-items/{id}/:
    get:
      operationId: management-historical-items-detail
      security:
        - api_key: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Historical item detail with nested parts, images and msDesc areas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoricalItemManagementDetail'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/item-parts/:
    get:
      operationId: management-item-parts-list
      security:
        - api_key: []
      responses:
        200:
          description: List item parts for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemPartManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/item-images/:
    get:
      operationId: management-item-images-list
      security:
        - api_key: []
      responses:
        200:
          description: List item images for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemImageManagementItem'
      tags:
        - manuscripts-management
    post:
      operationId: management-item-images-create
      security:
        - api_key: []
      description: >-
        Register an ItemImage row pointing at an EXISTING media-relative path.
        `image` accepts only a path string — uploading file bytes goes through
        /api/v1/uploads/, which converts to JP2 and smoke-tests SIPI first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemImageManagementItem'
      responses:
        201:
          description: Created item image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemImageManagementItem'
        400:
          description: Invalid payload (e.g. a file instead of a path string).
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/item-images/{id}/:
    patch:
      operationId: management-item-images-update
      security:
        - api_key: []
      description: >-
        Update locus/tags or repoint `image` at another existing media path
        (string only; never a file upload).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemImageManagementItem'
      responses:
        200:
          description: Updated item image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemImageManagementItem'
        400:
          description: Invalid payload (e.g. a file instead of a path string).
      tags:
        - manuscripts-management
    delete:
      operationId: management-item-images-delete
      security:
        - api_key: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Item image deleted (cascades to its texts and graphs).
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/image-texts/:
    get:
      operationId: management-image-texts-list
      security:
        - api_key: []
      responses:
        200:
          description: List image texts for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImageTextManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/catalogue-numbers/:
    get:
      operationId: management-catalogue-numbers-list
      security:
        - api_key: []
      responses:
        200:
          description: List catalogue numbers for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogueNumberManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/descriptions/:
    get:
      operationId: management-descriptions-list
      security:
        - api_key: []
      responses:
        200:
          description: List descriptions for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoricalItemDescriptionManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/msdesc-areas/:
    get:
      operationId: management-msdesc-areas-list
      security:
        - api_key: []
      parameters:
        - name: item_part
          in: query
          required: false
          schema:
            type: integer
        - name: area
          in: query
          required: false
          schema:
            type: string
            enum: [msIdentifier, msContents, physDesc, history]
      responses:
        200:
          description: List msDesc area fragments for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MsDescAreaManagementItem'
      tags:
        - manuscripts-management
    post:
      operationId: management-msdesc-areas-create
      security:
        - api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MsDescAreaManagementWrite'
      responses:
        201:
          description: Created msDesc area fragment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MsDescAreaManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/repositories/:
    get:
      operationId: management-repositories-list
      security:
        - api_key: []
      responses:
        200:
          description: List repositories for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RepositoryManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/current-items/:
    get:
      operationId: management-current-items-list
      security:
        - api_key: []
      responses:
        200:
          description: List current items for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurrentItemManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/sources/:
    get:
      operationId: management-sources-list
      security:
        - api_key: []
      responses:
        200:
          description: List bibliographic sources for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BibliographicSourceManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/formats/:
    get:
      operationId: management-formats-list
      security:
        - api_key: []
      responses:
        200:
          description: List formats for management.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemFormatManagementItem'
      tags:
        - manuscripts-management
  /api/v1/manuscripts/management/image-picker-content/:
    get:
      operationId: management-image-picker-content
      security:
        - api_key: []
      responses:
        200:
          description: List folders and images for picker popup.
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        path:
                          type: string
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        path:
                          type: string
                        url:
                          type: string
      tags:
        - manuscripts-management
components:
  schemas:
    Repository:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        location:
          type: string
        url:
          type: string
    ItemPartSearchResult:
      type: object
      properties:
        repository_name:
          type: string
        repository_city:
          type: string
        shelfmark:
          type: string
        catalogue_numbers:
          type: array
          items:
            type: string
        date:
          type: string
        type:
          type: string
        number_of_images:
          type: integer
    ItemPartDetails:
      type: object
      properties:
        id:
          type: integer
        display_label:
          type: string
        historical_item:
          type: object
          properties:
            type:
              type: string
            format:
              type: string
            date:
              type: integer
              nullable: true
            date_display:
              type: string
              nullable: true
            probable_text_date:
              type: string
            dating_notes:
              type: string
            catalogue_numbers:
              type: array
              items:
                type: object
                properties:
                  number:
                    type: string
                  url:
                    type: string
                  catalogue:
                    type: object
                    $ref: '#/components/schemas/Repository'
            descriptions:
              type: array
              items:
                type: object
                properties:
                  source:
                    type: object
                    $ref: '#/components/schemas/Repository'
                  content:
                    type: string
        current_item:
          type: object
          properties:
            shelfmark:
              type: string
            repository:
              type: object
              $ref: '#/components/schemas/Repository'
        msdesc_areas:
          description: Published TEI msDesc area fragments only (is_published=true).
          type: array
          items:
            type: object
            properties:
              area:
                type: string
                enum: [msIdentifier, msContents, physDesc, history]
              content:
                type: string
    ItemPart:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        shelfmark:
          type: string
        format:
          type: string
        language:
          type: string
        hair_type:
          type: string
        date:
          type: string
        repository_id:
          type: integer
        display_label:
          type: string
    ItemPartImage:
      type: object
      properties:
        id:
          type: integer
        iiif_image:
          type: string
        locus:
          type: string
        number_of_annotations:
          type: integer
        item_part:
          type: integer
        texts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              content:
                type: string
    RepositoryManagementItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        place:
          type: string
        url:
          type: string
        type:
          type: string
    BibliographicSourceManagementItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
    ItemFormatManagementItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    CurrentItemManagementItem:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        repository:
          type: integer
        repository_name:
          type: string
        shelfmark:
          type: string
        part_count:
          type: integer
    ImageTextManagementItem:
      type: object
      properties:
        id:
          type: integer
        item_image:
          type: integer
        content:
          type: string
        type:
          type: string
        status:
          type: string
        language:
          type: string
    ItemImageManagementItem:
      type: object
      properties:
        id:
          type: integer
        item_part:
          type: integer
        image:
          type: string
          description: >-
            Media-relative path (the SIPI IIIF identifier). Writes accept ONLY
            a path string — file bytes must go through /api/v1/uploads/.
        locus:
          type: string
        tags:
          # tagulous TagField serializes to a list of tag names (empty = []),
          # not a comma-joined string. (The write-input shape on
          # UploadSessionCreate.tags IS a string — different direction.)
          type: array
          items:
            type: string
        annotation_count:
          type: integer
        texts:
          type: array
          items:
            $ref: '#/components/schemas/ImageTextManagementItem'
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        source_format:
          type: string
        size_bytes:
          type: integer
          nullable: true
        checksum_sha256:
          type: string
        original_path:
          type: string
          description: Archive-relative path of the preservation original; empty for migrated rows.
        uploaded_by_username:
          type: string
          nullable: true
        created:
          type: string
          format: date-time
          nullable: true
        modified:
          type: string
          format: date-time
          nullable: true
    CatalogueNumberManagementItem:
      type: object
      properties:
        id:
          type: integer
        historical_item:
          type: integer
        number:
          type: string
        catalogue:
          type: integer
        catalogue_label:
          type: string
        url:
          type: string
    HistoricalItemDescriptionManagementItem:
      type: object
      properties:
        id:
          type: integer
        historical_item:
          type: integer
        source:
          type: integer
        source_label:
          type: string
        content:
          type: string
    MsDescAreaManagementItem:
      type: object
      properties:
        id:
          type: integer
        item_part:
          type: integer
        area:
          type: string
          enum: [msIdentifier, msContents, physDesc, history]
        content:
          type: string
        is_published:
          type: boolean
    MsDescAreaManagementWrite:
      type: object
      required:
        - item_part
        - area
      properties:
        item_part:
          type: integer
        area:
          type: string
          enum: [msIdentifier, msContents, physDesc, history]
        content:
          type: string
        is_published:
          type: boolean
    ItemPartManagementItem:
      type: object
      properties:
        id:
          type: integer
        historical_item:
          type: integer
        custom_label:
          type: string
        current_item:
          type: integer
          nullable: true
        current_item_display:
          type: string
          nullable: true
        current_item_locus:
          type: string
          nullable: true
        display_label:
          type: string
        image_count:
          type: integer
    HistoricalItemManagementListItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        format:
          type: integer
          nullable: true
        language:
          type: string
          nullable: true
        hair_type:
          type: string
          nullable: true
        date:
          type: integer
          nullable: true
    HistoricalItemManagementDetail:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        format:
          type: integer
          nullable: true
        format_display:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        hair_type:
          type: string
          nullable: true
        date:
          type: integer
          nullable: true
        date_display:
          type: string
          nullable: true
        probable_text_date:
          type: string
        dating_notes:
          type: string
        catalogue_numbers:
          type: array
          items:
            $ref: '#/components/schemas/CatalogueNumberManagementItem'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/HistoricalItemDescriptionManagementItem'
        item_parts:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              custom_label:
                type: string
              current_item:
                type: integer
                nullable: true
              current_item_display:
                type: string
                nullable: true
              current_item_locus:
                type: string
              display_label:
                type: string
              repository:
                type: integer
                nullable: true
              repository_name:
                type: string
                nullable: true
              shelfmark:
                type: string
                nullable: true
              images:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    image:
                      type: string
                      nullable: true
                    locus:
                      type: string
                    text_count:
                      type: integer
              msdesc_areas:
                type: array
                items:
                  $ref: '#/components/schemas/MsDescAreaManagementItem'
    HistoricalItemManagementWrite:
      type: object
      properties:
        type:
          type: string
        format:
          type: integer
          nullable: true
        language:
          type: string
        hair_type:
          type: string
        date:
          type: integer
          nullable: true
        probable_text_date:
          type: string
        dating_notes:
          type: string
  
tags:
  - name: manuscripts
  - name: manuscripts-management
