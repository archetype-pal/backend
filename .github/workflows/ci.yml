name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      jobs:
        description: "Which jobs to run"
        type: choice
        default: all
        options:
          - all
          - lint-only
          - tests-only

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.jobs != 'tests-only'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Validate lockfile
        run: uv lock --check
      - name: Lint
        run: uvx ruff check
      - name: Formatting
        run: uvx ruff format --check .
      - name: Type check
        run: uvx mypy apps config

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.jobs != 'lint-only'
    steps:
      - uses: actions/checkout@v6
      - name: Run compose-backed focused tests
        run: make pytest-focused
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-focused
          path: .test-results/junit-focused.xml
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.jobs != 'lint-only'
    env:
      API_ENV_FILE: config/test.env
    steps:
      - uses: actions/checkout@v6
      - name: Run tests with coverage gate
        run: make coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .test-results/coverage.xml
            .test-results/junit.xml
          if-no-files-found: ignore
