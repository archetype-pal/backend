name: archetype
services:
  meilisearch:
    image: getmeili/meilisearch:latest
    env_file: ${API_ENV_FILE:-config/.env}
    # No MEILI_MASTER_KEY in development: requests without a key are allowed.
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.3-bookworm}
    env_file: ${API_ENV_FILE:-config/.env}
    volumes:
      # PostgreSQL 18 Docker images use versioned PGDATA under /var/lib/postgresql.
      # Keep the volume mounted at the parent so future major upgrades can use
      # the official versioned layout.
      - postgres18:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d local"]
      interval: 5s
      timeout: 5s
      retries: 20
  pg-admin:
    image: dpage/pgadmin4:latest
    env_file: ${API_ENV_FILE:-config/.env}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
  # ftp:
  #   image: fauria/vsftpd
  #   restart: always
  #   environment:
  #     - FTP_USER=user
  #     - FTP_PASS=password
  #     - PASV_ADDRESS=127.0.0.1  # Change this if needed
  #     - PASV_MIN_PORT=21100
  #     - PASV_MAX_PORT=21110
  #   ports:
  #     - "21:21"
  #     - "21100-21110:21100-21110"
  #   volumes:
  #     - ./storage/media:/home/vsftpd/user
  api:
    image: ghcr.io/archetype-pal/backend:latest
    build: .
    command: python manage.py runserver 0.0.0.0:80 --nostatic
    env_file: ${API_ENV_FILE:-config/.env}
    ports:
      - "8000:80"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_started
      meilisearch:
        condition: service_started
      redis:
        condition: service_healthy
  image_server:
    image: daschswiss/sipi
    ports:
      - 1024:1024
    volumes:
      - ./storage/media:/sipi/images
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 30s
      retries: 50

  celery:
    image: ghcr.io/archetype-pal/backend:latest
    command: celery -A config worker -l info
    env_file: ${API_ENV_FILE:-config/.env}
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
      - meilisearch

volumes:
  postgres18:
  meilisearch_data:
  pgadmin-data:
