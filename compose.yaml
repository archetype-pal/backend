# Local development stack ONLY. This file exists so developers can run the
# backend with one command (`just up`) and to back the compose-based test
# recipes used by CI. It is not a deployment artifact — staging/production
# run from the infrastructure repo (archetype-pal/infrastructure), which owns
# nginx/TLS, healthchecked service ordering, image pinning, and backups.
name: archetype
services:
  meilisearch:
    image: getmeili/meilisearch:v1.45.2
    environment:
      - MEILI_ENV=${MEILI_ENV}
      # Migrate the on-disk index format in place when the image is bumped to a
      # newer Meilisearch. Without this, a version mismatch (e.g. data written by
      # 1.42.1 vs engine 1.45.2) makes the server refuse to start. No-op when the
      # versions already match. Safe here — no embedders/vector indexes.
      - MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE=true
    # No MEILI_MASTER_KEY in development: requests without a key are allowed.
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  postgres:
    # Stay on the bookworm (glibc 2.36) base: the data dir's collation was
    # created with 2.36, and the trixie base (glibc 2.41) triggers a collation
    # version mismatch that would force a REINDEX. The postgres image isn't
    # CVE-scanned by CD, so a newer base buys nothing here.
    # POSTGRES_IMAGE is overridden by scripts/upgrade-postgres-17-to-18-local.sh.
    image: ${POSTGRES_IMAGE:-postgres:18.4-bookworm}
    volumes:
      # PostgreSQL 18 Docker images use versioned PGDATA under /var/lib/postgresql.
      # Keep the volume mounted at the parent so future major upgrades can use
      # the official versioned layout.
      - postgres18:/var/lib/postgresql
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=${PGDATA}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d local" ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    # Local-only tag built from this checkout. Release images are built by CI
    # (cd.yml) and consumed by the infrastructure repo — never by this file.
    image: archetype-backend:local
    build: .
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - MEILISEARCH_URL=${MEILISEARCH_URL}
      - MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY}
      - MEILISEARCH_INDEX_PREFIX=${MEILISEARCH_INDEX_PREFIX}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - IIIF_HOST=${IIIF_HOST}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - SITE_NAME=${SITE_NAME}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - SESSION_COOKIE_DOMAIN=${SESSION_COOKIE_DOMAIN}
      - CSRF_COOKIE_DOMAIN=${CSRF_COOKIE_DOMAIN}
      - SEARCH_AUTO_REINDEX=${SEARCH_AUTO_REINDEX}
      - SEARCH_REINDEX_DEBOUNCE_SECONDS=${SEARCH_REINDEX_DEBOUNCE_SECONDS}
      - HISTORICAL_ITEM_TYPES=${HISTORICAL_ITEM_TYPES}
      - HISTORICAL_ITEM_HAIR_TYPES=${HISTORICAL_ITEM_HAIR_TYPES}
      - REPOSITORY_TYPES=${REPOSITORY_TYPES}
      - CHARACTER_ITEM_TYPES=${CHARACTER_ITEM_TYPES}
    ports:
      - "8000:80"
    command: python manage.py runserver 0.0.0.0:80 --nostatic
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      redis:
        condition: service_healthy

  image_server:
    image: daschswiss/sipi:v5.0.1
    ports:
      # Host port 8182, not 1024 — resident software routinely squats 1024
      # (e.g. on Windows/WSL, silently 404-ing every IIIF request).
      - "8182:1024"
    volumes:
      - ./storage/media:/sipi/images

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50

  celery:
    image: archetype-backend:local
    command: celery -A config worker -l info
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - MEILISEARCH_URL=${MEILISEARCH_URL}
      - MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    env_file: ${API_ENV_FILE:-config/.env}
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MEILISEARCH_URL=http://meilisearch:7700

volumes:
  postgres18:
  meilisearch_data:
